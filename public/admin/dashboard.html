<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn — Scripts</title>
  <style>
    :root { --bg:#0a0a0a; --surface:#111; --border:#1f1f1f; --text:#fff; --text2:#a0a0a0; --radius:12px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
    .sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); padding:1.5rem; display:flex; flex-direction:column; gap:2rem; }
    .sidebar h2 { font-size:1.2rem; font-weight:800; }
    .logout { margin-top:auto; color:#f44; cursor:pointer; font-weight:600; background:none; border:none; text-align:left; font-size:1rem; }
    .main { flex:1; padding:2rem; overflow-y:auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
    .header h1 { font-size:1.8rem; }
    .btn { padding:0.6rem 1.2rem; border-radius:8px; font-weight:600; cursor:pointer; border:none; background:#fff; color:#000; }
    .btn-danger { background:transparent; color:#f44; border:1px solid #f44; }
    .btn-sm { padding:0.3rem 0.7rem; font-size:0.8rem; }
    table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius); overflow:hidden; }
    th { background:#1a1a1a; padding:0.8rem; text-align:left; font-size:0.8rem; color:var(--text2); }
    td { padding:0.8rem; border-bottom:1px solid var(--border); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
    .modal.show { display:flex; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:500px; }
    input, textarea { width:100%; padding:0.7rem; background:#1a1a1a; border:1px solid var(--border); border-radius:8px; color:#fff; margin-top:0.5rem; }
    textarea { height:200px; resize:vertical; font-family:'Fira Code',monospace; }
    .toast { position:fixed; bottom:20px; right:20px; background:#0c6; color:#000; padding:0.8rem 1.5rem; border-radius:8px; font-weight:600; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h2>🪐 Saturn</h2>
    <button class="logout" onclick="logout()">🚪 Sair</button>
  </aside>

  <main class="main">
    <div class="header">
      <h1>Scripts</h1>
      <div>
        <button class="btn" onclick="exportData()">📤 Exportar</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">📥 Importar</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn" onclick="openModal()">+ Novo Script</button>
      </div>
    </div>
    <table>
      <thead><tr><th>Nome</th><th>Status</th><th>Execuções</th><th>Ações</th></tr></thead>
      <tbody id="scriptsTable"></tbody>
    </table>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <h2 id="modalTitle">Novo Script</h2>
      <form id="scriptForm">
        <input type="hidden" id="scriptId">
        <label>Nome</label><input type="text" id="scriptName" required>
        <label>Status</label>
        <select id="scriptStatus"><option value="online">Online</option><option value="offline">Offline</option></select>
        <label>Conteúdo</label><textarea id="scriptContent" required></textarea>
        <div style="margin-top:1rem; display:flex; gap:1rem;">
          <button type="submit" class="btn">Salvar</button>
          <button type="button" class="btn btn-danger" onclick="closeModal()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function api(url, options = {}) {
      const res = await fetch(url, { credentials:'include', ...options });
      if (res.status === 401) window.location.href = '/admin';
      return res;
    }

    async function loadScripts() {
      const res = await api('/api/scripts');
      const scripts = await res.json();
      const tbody = document.getElementById('scriptsTable');
      tbody.innerHTML = scripts.map(s => `
        <tr>
          <td><strong>${s.name}</strong></td>
          <td>${s.status}</td>
          <td>${s.executions||0}</td>
          <td>
            <button class="btn btn-sm" onclick="editScript('${s.id}')">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteScript('${s.id}')">🗑️</button>
            <button class="btn btn-sm" onclick="copyLoader('${s.id}')">📋</button>
          </td>
        </tr>
      `).join('');
    }

    function copyLoader(id) {
      navigator.clipboard.writeText(`${location.origin}/api/load/${id}`);
      alert('Loader copiado!');
    }

    function openModal(script = null) {
      document.getElementById('modal').classList.add('show');
      document.getElementById('scriptForm').reset();
      if (script) {
        document.getElementById('modalTitle').textContent = 'Editar Script';
        document.getElementById('scriptId').value = script.id;
        document.getElementById('scriptName').value = script.name;
        document.getElementById('scriptStatus').value = script.status;
        document.getElementById('scriptContent').value = script.content;
      } else {
        document.getElementById('modalTitle').textContent = 'Novo Script';
      }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    async function editScript(id) {
      const res = await api('/api/scripts/' + id);
      openModal(await res.json());
    }

    async function deleteScript(id) {
      if (confirm('Excluir?')) { await api('/api/scripts/'+id, {method:'DELETE'}); loadScripts(); }
    }

    document.getElementById('scriptForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('scriptId').value;
      const name = document.getElementById('scriptName').value.trim();
      const content = document.getElementById('scriptContent').value;
      const status = document.getElementById('scriptStatus').value;
      if (!name || !content) return alert('Preencha nome e conteúdo');
      const url = id ? '/api/scripts/'+id : '/api/scripts';
      const method = id ? 'PUT' : 'POST';
      await api(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, content, status}) });
      closeModal();
      loadScripts();
    });

    async function exportData() {
      const res = await api('/api/export');
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'saturn_backup.json';
      a.click();
    }

    async function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const data = JSON.parse(text);
      await api('/api/import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
      loadScripts();
    }

    function logout() { api('/api/auth/logout', {method:'POST'}).then(() => window.location.href='/admin'); }

    loadScripts();
  </script>
</body>
</html>

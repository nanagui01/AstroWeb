<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Astro — Teste Abas</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
    .sidebar { width: 200px; background: #111; padding: 1rem; }
    .sidebar button { display: block; width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; background: #222; border: none; color: #fff; cursor: pointer; }
    .main { flex: 1; padding: 2rem; }
    .error { color: #f44; }
  </style>
</head>
<body>
  <div class="sidebar">
    <button id="btnDashboard">Dashboard</button>
    <button id="btnScripts">Scripts</button>
  </div>
  <div class="main">
    <div id="content">Selecione uma aba</div>
  </div>

  <script>
    var ADMIN_PATH = '/painel';

    function showError(msg) {
      document.getElementById('content').innerHTML = '<div class="error">' + msg + '</div>';
    }

    function loadScripts() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/scripts', true);
      xhr.withCredentials = true;
      xhr.onload = function() {
        if (xhr.status === 401) {
          window.location.href = ADMIN_PATH;
          return;
        }
        var data = JSON.parse(xhr.responseText);
        if (Array.isArray(data)) {
          var html = '<h2>Scripts (' + data.length + ')</h2>';
          data.forEach(function(s) {
            html += '<p>' + s.name + ' - ' + (s.executions||0) + ' execuções</p>';
          });
          document.getElementById('content').innerHTML = html;
        } else {
          showError('Resposta inesperada');
        }
      };
      xhr.onerror = function() { showError('Erro de rede'); };
      xhr.send();
    }

    function loadDashboard() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/stats', true);
      xhr.withCredentials = true;
      xhr.onload = function() {
        if (xhr.status === 401) { window.location.href = ADMIN_PATH; return; }
        var data = JSON.parse(xhr.responseText);
        document.getElementById('content').innerHTML = '<h2>Dashboard</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
      };
      xhr.send();
    }

    document.getElementById('btnScripts').addEventListener('click', loadScripts);
    document.getElementById('btnDashboard').addEventListener('click', loadDashboard);
  </script>
</body>
</html>

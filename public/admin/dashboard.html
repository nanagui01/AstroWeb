<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Storage — Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0d10;
      color: #fff;
      display: flex;
    }

    .sidebar {
      width: 240px;
      background: #111;
      padding: 20px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #151515;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .box {
      background: #151515;
      padding: 15px;
      border-radius: 10px;
    }

    .muted {
      color: #aaa;
      font-size: 13px;
    }

    button {
      background: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Saturn Panel</h3>
  <p class="muted">Admin Dashboard</p>

  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <h2>Dashboard</h2>

  <div class="row">
    <div class="box" id="statScripts">Scripts: ...</div>
    <div class="box" id="statKeys">Keys: ...</div>
    <div class="box" id="statExec">Executions: ...</div>
  </div>

  <h3>Scripts</h3>
  <div id="scripts"></div>

  <h3>Keys</h3>
  <div id="keys"></div>

</div>

<script>
async function checkAuth() {
  const r = await fetch("/api/auth/me", {
    credentials: "include"
  });

  if (!r.ok) {
    window.location.href = "/admin";
  }
}

async function loadStats() {
  try {
    const r = await fetch("/api/stats", {
      credentials: "include"
    });

    const d = await r.json();

    document.getElementById("statScripts").innerText = "Scripts: " + d.scripts;
    document.getElementById("statKeys").innerText = "Keys: " + d.keys;
    document.getElementById("statExec").innerText = "Executions: " + d.executions;

  } catch {
    console.log("stats error");
  }
}

async function loadScripts() {
  const box = document.getElementById("scripts");

  try {
    const r = await fetch("/api/scripts", {
      credentials: "include"
    });

    const data = await r.json();

    if (!data.length) {
      box.innerHTML = "<p class='muted'>Nenhum script</p>";
      return;
    }

    box.innerHTML = data.map(s => `
      <div class="card">
        <b>${s.name}</b><br>
        <span class="muted">Exec: ${s.executions || 0}</span>
      </div>
    `).join("");

  } catch {
    box.innerHTML = "<p class='muted'>Erro ao carregar scripts</p>";
  }
}

async function loadKeys() {
  const box = document.getElementById("keys");

  try {
    const r = await fetch("/api/keys", {
      credentials: "include"
    });

    const data = await r.json();

    if (!data.length) {
      box.innerHTML = "<p class='muted'>Nenhuma key</p>";
      return;
    }

    box.innerHTML = data.map(k => `
      <div class="card">
        🔑 ${k.key}
      </div>
    `).join("");

  } catch {
    box.innerHTML = "<p class='muted'>Erro ao carregar keys</p>";
  }
}

function logout() {
  fetch("/api/auth/logout", { credentials: "include" })
    .then(() => window.location.href = "/admin");
}

// INIT
async function init() {
  await checkAuth();

  loadStats();
  loadScripts();
  loadKeys();

  // 🔥 LIVE UPDATE (KeyAuth style)
  setInterval(() => {
    loadStats();
    loadScripts();
    loadKeys();
  }, 5000);
}

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro — Login</title>
  <style>
    :root { --bg:#0a0a0a; --surface:#111; --border:#1f1f1f; --text:#fff; --text2:#a0a0a0; --primary:#6366f1; --danger:#ef4444; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:360px; }
    h2 { text-align:center; margin-bottom:1.5rem; }
    input { width:100%; padding:0.8rem; margin-bottom:1rem; background:#1a1a1a; border:1px solid var(--border); border-radius:8px; color:#fff; font-size:1rem; }
    button { width:100%; padding:0.8rem; background:#fff; color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem; }
    .error { color:var(--danger); font-size:0.9rem; text-align:center; display:none; margin-bottom:1rem; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div id="step1">
      <h2>Astro Admin</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Usuário" required>
        <input type="password" id="password" placeholder="Senha" required>
        <div class="error" id="error1">Credenciais inválidas</div>
        <button type="submit">Entrar</button>
      </form>
    </div>
    <div id="step2" class="hidden">
      <h2>Verificação 2FA</h2>
      <p style="color:var(--text2); text-align:center;">Insira o código do seu aplicativo.</p>
      <form id="twofaForm">
        <input type="text" id="twofaCode" placeholder="000000" maxlength="6" required>
        <div class="error" id="error2">Código inválido</div>
        <button type="submit">Verificar</button>
      </form>
    </div>
  </div>
  <script>
    let tempToken = null;
    async function getCsrf() { const r = await fetch('/api/csrf-token', { credentials:'include' }); const d = await r.json(); return d.csrfToken; }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const csrf = await getCsrf();
      const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':csrf}, body:JSON.stringify({ username, password }), credentials:'include' });
      const data = await res.json();
      if (data.require2FA) { tempToken = data.tempToken; document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
      else if (data.success) window.location.href = data.redirectPath;
      else document.getElementById('error1').style.display = 'block';
    });
    document.getElementById('twofaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('twofaCode').value.trim();
      const csrf = await getCsrf();
      const res = await fetch('/api/auth/verify-2fa', { method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':csrf}, body:JSON.stringify({ tempToken, code }), credentials:'include' });
      const data = await res.json();
      if (data.success) window.location.href = data.redirectPath;
      else document.getElementById('error2').style.display = 'block';
    });
  </script>
</body>
</html>

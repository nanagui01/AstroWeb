<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Panel - Script Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel='icon' href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="%23d9a94e" stroke-width="2" transform="rotate(-20 16 16)"/><circle cx="16" cy="16" r="8" fill="%23d9a94e"/></svg>'>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col bg-black text-white">
  <nav class="navbar">
    <span class="navbar-brand"><span class="brand-mark"></span>SATURN PANEL</span>
    <div class="navbar-actions">
      <a href="/admin" class="btn btn-primary btn-sm">Admin</a>
    </div>
  </nav>

  <main class="hero flex-1">
    <div class="hero-content">
      <div class="hero-badge">Welcome to</div>
      <h1 class="hero-title">SATURN PANEL</h1>
      <p class="hero-subtitle">The ultimate script library. Fast, secure, always online.</p>

      <div class="code-box">
        <div class="code-header">
          <span class="code-dot"></span>
          <span class="code-dot"></span>
          <span class="code-dot"></span>
        </div>
        <code id="loaderSnippet">
          <span style="color:#fff">Key</span> = <span style="color:#9b9aa1">"SATURN-XXXX-XXXX-XXXX"</span><br><br>
          <span style="color:#fff">loadstring</span>(<span style="color:#fff">game:HttpGet</span>(<span style="color:#5c5b61">"https://saturnpanel.space/api/load/</span><span style="color:#fff">scriptId</span><span style="color:#5c5b61">?key="</span> .. <span style="color:#fff">Key</span>))()
        </code>
      </div>

      <div class="flex gap-2" style="justify-content:center;">
        <button class="btn btn-primary" onclick="copyLoader(this)">Copy Loader</button>
        <a href="/admin" class="btn btn-secondary">Admin Panel</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div>&copy; 2026 Saturn Panel. Built for script enthusiasts.</div>
  </footer>

  <script>
    function copyLoader(btn) {
      const code = 'Key = "SATURN-XXXX-XXXX-XXXX"\nloadstring(game:HttpGet("https://saturnpanel.space/api/load/scriptId?key=" .. Key))()';
      navigator.clipboard.writeText(code).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1500);
      }).catch(() => alert('Não foi possível copiar automaticamente. Copie o snippet manualmente.'));
    }
  </script>
</body>
</html>

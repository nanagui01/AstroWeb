<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn — Script Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --primary: #6366f1;
      --online: #10b981;
      --offline: #ef4444;
      --maintenance: #f59e0b;
      --development: #8888ff;
      --radius: 16px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #fff;
      color: #000;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }
    .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

    .hero {
      text-align: center;
      padding: 3rem 2rem 1rem;
    }
    .hero h2 {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.1rem; }
    .code-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: left;
      margin: 0 auto 2rem;
      max-width: 550px;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      word-break: break-all;
    }
    .code-box .dots { display: flex; gap: 6px; margin-bottom: 1rem; }
    .code-box .dots span { width: 10px; height: 10px; border-radius: 50%; background: #333; }
    .code-box .dots span:nth-child(2) { background: #555; }
    .code-box .dots span:nth-child(3) { background: #777; }
    .code-box code { color: #ccc; line-height: 1.6; }
    .code-box .highlight { color: #fff; }

    /* Seção de scripts */
    .scripts-section { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; }
    .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }

    /* Card */
    .script-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .script-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.6), 0 0 20px rgba(99,102,241,0.15);
    }
    .card-image-wrapper {
      position: relative;
      width: 100%;
      height: 160px;
      overflow: hidden;
    }
    .card-image {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #444;
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .script-card:hover .card-image {
      transform: scale(1.05);
      filter: brightness(1.1);
    }
    .card-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      pointer-events: none;
    }
    .card-status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 2;
      color: #fff;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-online .status-dot { background: var(--online); }
    .status-offline .status-dot { background: var(--offline); }
    .status-maintenance .status-dot { background: var(--maintenance); }
    .status-development .status-dot { background: var(--development); }

    .card-body { padding: 1rem 1.2rem; }
    .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .card-meta span { display: inline-flex; align-items: center; gap: 0.3rem; }

    /* Efeito de brilho no hover */
    .script-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.5s;
      pointer-events: none;
    }
    .script-card:hover::after {
      left: 100%;
    }

    footer { margin-top: auto; padding: 1.5rem; text-align: center; color: #333; font-size: 0.85rem; border-top: 1px solid var(--border); }

    @media (max-width: 768px) {
      .hero h2 { font-size: 2rem; }
      .scripts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>Saturn</h1>
    <a href="/status" class="btn btn-outline">Status</a>
  </nav>

  <section class="hero">
    <h2>Scripts Profissionais</h2>
    <p>Escolha um script, veja detalhes e execute no seu jogo favorito.</p>
  </section>

  <section class="scripts-section">
    <h2 class="section-title">Scripts Disponíveis</h2>
    <div class="scripts-grid" id="scriptsGrid"></div>
  </section>

  <footer>
    <p>Saturn &copy; 2026 — Scripts para Roblox</p>
  </footer>

  <script>
    // Dados mockados de exemplo (cada objeto = um script)
    const scriptsMock = [
      {
        id: 'abc123',
        name: 'Blox Fruits',
        status: 'online',
        version: '2.1.0',
        updated_at: '2026-06-20',
        image: '' // URL da imagem (se vazia, mostra ícone)
      },
      {
        id: 'def456',
        name: 'Pet Simulator X',
        status: 'online',
        version: '1.5.3',
        updated_at: '2026-06-18',
        image: ''
      },
      {
        id: 'ghi789',
        name: 'Jailbreak',
        status: 'offline',
        version: '3.0.1',
        updated_at: '2026-05-12',
        image: ''
      },
      {
        id: 'jkl012',
        name: 'Arsenal',
        status: 'maintenance',
        version: '4.2.0',
        updated_at: '2026-06-22',
        image: ''
      },
      {
        id: 'mno345',
        name: 'Adopt Me!',
        status: 'online',
        version: '1.0.0',
        updated_at: '2026-06-01',
        image: ''
      },
      {
        id: 'pqr678',
        name: 'Murder Mystery 2',
        status: 'development',
        version: '2.0.0-beta',
        updated_at: '2026-06-25',
        image: ''
      }
    ];

    function renderScripts(scripts) {
      const grid = document.getElementById('scriptsGrid');
      grid.innerHTML = scripts.map(s => {
        const statusClass = `status-${s.status}`;
        const statusLabels = {
          online: 'Online',
          offline: 'Offline',
          maintenance: 'Manutenção',
          development: 'Desenvolvimento'
        };
        const statusLabel = statusLabels[s.status] || 'Online';
        const bgStyle = s.image ? `style="background-image:url(${s.image})"` : '';
        return `
          <div class="script-card" onclick="window.location.href='/get/${s.id}'">
            <div class="card-image-wrapper">
              <div class="card-image" ${bgStyle}>
                ${!s.image ? '🎮' : ''}
              </div>
              <div class="card-image-overlay"></div>
              <div class="card-status-badge ${statusClass}">
                <span class="status-dot"></span> ${statusLabel}
              </div>
            </div>
            <div class="card-body">
              <div class="card-name">${escapeHtml(s.name)}</div>
              <div class="card-meta">
                <span>📦 v${escapeHtml(s.version)}</span>
                <span>🕒 ${formatDate(s.updated_at)}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    renderScripts(scriptsMock);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Ferramentas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b0b0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2.5rem 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        }

        .card i {
            font-size: 2.5rem;
            color: #fff;
            opacity: 0.8;
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .card p {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
        }

        .status {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Central de Ferramentas</h1>
        <p class="subtitle">Escolha a categoria desejada</p>

        <div class="grid">
            <!-- Bloco Discord -->
            <div class="card" onclick="alert('Em breve: Ferramentas para Discord')">
                <i class="fa-brands fa-discord"></i>
                <h2>Discord</h2>
                <p>Gerenciamento de contas, webhooks, embeds e automações.</p>
            </div>

            <!-- Bloco Divulgação -->
            <div class="card" onclick="alert('Em breve: Divulgação de cursos/sites')">
                <i class="fa-solid fa-bullhorn"></i>
                <h2>Divulgação</h2>
                <p>Sites de marketing, landing pages e templates de vendas.</p>
            </div>

            <!-- Bloco Gerador -->
            <div class="card" onclick="alert('Em breve: Geradores diversos')">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h2>Gerador</h2>
                <p>Geradores de código, senhas, tokens e muito mais.</p>
            </div>
        </div>

        <div class="status">🟢 Online · Nenhum módulo ativo no momento</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Manager - Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-logo"><i class="fa-brands fa-discord"></i></div>
    <h2>Entrar com Token</h2>
    <p>Insira seu token do Discord para acessar o painel.</p>
    <form id="loginForm">
      <div class="form-group">
        <label>Token do Discord</label>
        <input type="password" id="tokenInput" placeholder="Cole seu token aqui" autocomplete="off" required>
      </div>
      <div class="error-msg" id="errorMsg">Token inválido ou erro na API.</div>
      <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Acessar Dashboard</button>
    </form>
    <p style="margin-top:1.5rem;font-size:0.75rem;color:var(--text-muted);">
      <i class="fa-solid fa-shield-halved"></i> Seu token é usado apenas no navegador.
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('tokenInput').value.trim();
      if (!token) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Por favor, insira um token.';
        return;
      }

      // Testa o token buscando o próprio usuário
      try {
        const res = await fetch('https://discord.com/api/v10/users/@me', {
          headers: { Authorization: token }
        });
        if (!res.ok) throw new Error('Token inválido');
        const userData = await res.json();
        // Salva token e dados básicos na sessionStorage
        sessionStorage.setItem('discord_token', token);
        sessionStorage.setItem('discord_user', JSON.stringify(userData));
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Token inválido ou sem conexão.';
      }
    });
  </script>
</body>
</html>
